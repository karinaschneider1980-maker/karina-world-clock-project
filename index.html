<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock by Karina Schneider</title>
</head>

<body>
    <div class="image">
        <img src="https://s3.amazonaws.com/shecodesio-production/uploads/files/000/179/344/original/19388.jpg?1774963017"
            alt="world" />

        <div class="container">
            <h1>World Clock</h1>

            <select id="city">
                <option value="">Select a city</option>
                <option value="America/New_York">New York</option>
                <option value="Europe/Amsterdam">Amsterdam</option>
                <option value="Asia/Seoul">Seoul</option>
            </select>
            <div id="cities">
                <div class="city" id="usa">
                    <div>
                        <h4>New York</h4>
                        <div class="date"></div>
                    </div>
                    <div class="time"></div>
                </div>
                <div class="city" id="europe">
                    <div>
                        <h4>Amsterdam</h4>
                        <div class="date"></div>
                    </div>
                    <div class="time"></div>
                </div>
                <div class="city" id="asia">
                    <div>
                        <h4>Seoul</h4>
                        <div class="date"></div>
                    </div>
                    <div class="time"></div>
                </div>
            </div>

        </div>
    </div>

    <footer>
        This World Clock project was coded by
        <a href="https://github.com/karinaschneider1980-maker/" target="_blank">Karina Schneider</a> and
        is
        <a href="https://github.com/karinaschneider1980-maker/karina-world-clock-project" target="_blank">
            open-sourced on GitHub</a>
        and is
        <a href="https://karina-world-clock-project.onrender.com/" target="_blank">hosted on Render</a>.
        <a href="" target="_blank">
            Afbeelding van "" op Freepik
        </a>
    </footer>
    <script src="javascript/index.js"></script>
</body>

</html>
