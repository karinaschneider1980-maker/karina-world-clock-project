<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>World Clock by Karina Schneider</title>
</head>

<body>
    <div class="image">
        <img src="https://s3.amazonaws.com/shecodesio-production/uploads/files/000/179/344/original/19388.jpg?1774963017"
            alt="world" />

        <h1>World Clock</h1>

        <div class="container">
            <select>
                <option value="">Select a city</option>
                <option value="new york">New York</option>
                <option value="amsterdam">Amsterdam</option>
                <option value="seoul">Seoul</option>
            </select>

            <div class="cities">
                <h4>New York</h4>
                <div class="date">April 1st 2026</div>
                <div class="time">3:09:15 pM</div>
            </div>
            <div class="city">
                <h4>Amsterdam</h4>
                <div class="date">April 1st 2026</div>
                <div class="time">3:09:15 pM</div>
            </div>
            <div class="cities">
                <h4>Seoul</h4>
                <div class="date">April 1st 2026</div>
                <div class="time">3:09:15 pM</div>
            </div>
        </div>
    </div>

    <footer>
        This World Clock project was coded by
        <a href="https://github.com/karinaschneider1980-maker/" target="_blank">Karina Schneider</a> and
        is
        <a href="https://github.com/karinaschneider1980-maker/k-city-query" target="_blank">
            open-sourced on GitHub</a>
        and is
        <a href="https://k-city-query.onrender.com" target="_blank">hosted on Render</a>.
        <a href="" target="_blank">
            Afbeelding van "" op Freepik
        </a>
    </footer>
    </div>
    <script src="javascript/index.js"></script>
</body>


</html>
